replicaCount: 1

image:
  repository: ghcr.io/dlunch/bot
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

env:
  maxThreadHistory: 20
  slackStreamUpdateMs: 800
  discordStreamUpdateMs: 800

auth:
  existingSecret: ""
  refreshToken: ""
  anthropicApiKey: ""
  refreshTokenFile: /app/data/codex-refresh-token
  persistence:
    existingClaim: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /app/data

config:
  servicesExistingSecret: ""

  providers:
    codex:
      models: []
    anthropic:
      models: []

  services:
    slack: []
    discord: []
    irc: []
