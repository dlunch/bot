{{- if not .Values.auth.existingSecret }}
{{- if and (not .Values.auth.refreshToken) (not .Values.auth.anthropicApiKey) }}
{{- fail "auth.refreshToken or auth.anthropicApiKey is required when auth.existingSecret is empty" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bot.authSecretName" . }}
  labels:
    {{- include "bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.refreshToken }}
  CODEX_REFRESH_TOKEN: {{ .Values.auth.refreshToken | quote }}
  {{- end }}
  {{- if .Values.auth.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.auth.anthropicApiKey | quote }}
  {{- end }}
{{- end }}
