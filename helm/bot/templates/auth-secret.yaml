{{- if not .Values.auth.existingSecret }}
{{- if and (not .Values.auth.codex.refreshToken) (not .Values.auth.anthropic.apiKey) }}
{{- fail "auth.codex.refreshToken or auth.anthropic.apiKey is required when auth.existingSecret is empty" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bot.authSecretName" . }}
  labels:
    {{- include "bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.codex.refreshToken }}
  CODEX_REFRESH_TOKEN: {{ .Values.auth.codex.refreshToken | quote }}
  {{- end }}
  {{- if .Values.auth.anthropic.apiKey }}
  ANTHROPIC_API_KEY: {{ .Values.auth.anthropic.apiKey | quote }}
  {{- end }}
{{- end }}
