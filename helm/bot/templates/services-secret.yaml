{{- if not .Values.config.servicesExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bot.servicesSecretName" . }}
  labels:
    {{- include "bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  services.json: |
    {{- $cfg := dict "providers" .Values.config.providers "slack" .Values.config.services.slack "discord" .Values.config.services.discord "irc" .Values.config.services.irc -}}
    {{- $cfg | toJson | nindent 4 }}
{{- end }}

